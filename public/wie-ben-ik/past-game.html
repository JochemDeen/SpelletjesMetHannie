<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Wie ben ik? - Vorige Spel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/wie-ben-ik/css/wie-ben-ik.css">
  <link rel="stylesheet" href="/wie-ben-ik/css/past-game.css">
</head>
<body>
    <a href="/dashboard" class="home-button">
        <img src="/images/home.png" alt="Home" />
    </a>

    <h1>Wie ben ik? Spellen</h1>

    <div class="date-navigation">
        <button id="prevDateButton" class="nav-arrow"><<</button>
        <span id="game-info"></span>
        <button id="nextDateButton" class="nav-arrow">>></button>
    </div>

    <div id="game-state-container">
        <div id="winner-banner" class="hidden"></div>

        <!-- All players with their characters revealed -->
        <div id="players-container">
            <h3>De personages</h3>
            <div id="players-list"></div>
        </div>

        <!-- Full question history with vote counts -->
        <div id="history-container">
            <h3>Vragen en antwoorden</h3>
            <table>
              <thead>
                <tr>
                  <th title="Ronde">#</th>
                  <th>Speler</th>
                  <th>Vraag</th>
                  <th>Ja</th>
                  <th>Nee</th>
                  <th>?</th>
                </tr>
              </thead>
              <tbody id="historyTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="/wie-ben-ik/js/past-game.js"></script>
</body>
</html>
