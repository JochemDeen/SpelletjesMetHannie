<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="/stylesdb.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha384-k6RqeWeci5ZR/Lv4MR0sA0FfDOMe55WeB3uuivdVx1lH3CB+rs9KY5z1ED6Lks" crossorigin="anonymous">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f4f4f4;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      margin-top: 20px;
      font-size: 2.5em;
      color: #222;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1200px;
      width: 100%;
      padding: 20px;
    }

    .game-card {
      background-color: #ffffff;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      text-align: center;
    }

    .game-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }

    .game-card a {
      text-decoration: none;
      color: inherit;
    }

    .game-card img {
      width: 100%;
      height: auto;
    }

    .game-card h2 {
      font-size: 1.5em;
      margin: 15px 0;
      color: #333;
    }

    .coming-soon {
      color: #888;
      font-style: italic;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2em;
      }
    }
  </style>
</head>
<body>
  <h1>Kies een spelletje</h1>
  <div class="game-grid">
    <div class="game-card">
      <a href="/mastermind">
        <img src="/images/mastermind.png" alt="Mastermind">
        <h2>Mastermind</h2>
      </a>
    </div>
    <div class="game-card">
      <img src="/images/temp.png" alt="Game 2">
      <h2>Game 2 <span class="coming-soon">(Binnenkort)</span></h2>
    </div>
    <div class="game-card">
      <img src="/images/temp.png" alt="Game 3">
      <h2>Game 3 <span class="coming-soon">(Binnenkort)</span></h2>
    </div>
  </div>
</body>
</html>
