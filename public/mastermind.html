<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Mastermind</title>
  <link rel="stylesheet" href="/css/mastermind.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />


</head>
<body>
    <header id="game-header">
      <a href="/dashboard" class="home-button">
        <img src="/images/home.png" alt="Home" />
      </a>
      <h1>Raad het woord!</h1>
      <nav id="nav-links">
        <a href="/mastermind" id="play-link">Spelen</a>
        <a href="/mastermind/compare" id="compare-link">Samenvatting</a>
        <a href="/mastermind/stats" id="stats-link">Stats</a>
        <a href="/mastermind/scoreboard" id="scoreboard-link">Scoreboard</a>
      </nav>
    </header>
    
    <div id="game-container">
        <!-- Grid will be generated dynamically -->

      </div>

      <div id="hint-toggle-container">
        <span id="hint-toggle">Vraag Ollie</span>
      </div>

      <div id="hint-panel" style="display: none;">
        <div id="hint-quota"></div>
        <button id="request-hint-btn">Vraag een hint</button>
        <div id="hint-response"></div>
        <div id="hint-loading" style="display: none;">
          <span class="spinner"></span> Ollie denkt na...
        </div>
      </div>

      <div id="keyboard">
         
          <img id="shareButton" src="/images/share-ios.svg" alt="Share on WhatsApp" />

        <div class="keyboard-row" id="row-1"></div>
        <div class="keyboard-row" id="row-2"></div>
        <div class="keyboard-row" id="row-3"></div>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script src="/js/mastermind.js"></script>
</body>
</html>
