<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Spel Statistieken</title>
  <link rel="stylesheet" href="/css/mastermind.css">
  <link rel="stylesheet" href="/css/stats.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/scoreboard.css"> 
</head>
<body>
    <header id="game-header">
      <a href="/dashboard" class="home-button">
        <img src="/images/home.png" alt="Home" />
      </a>
      <h1>Scoreboard</h1>
      <nav id="nav-links">
        <a href="/mastermind" id="play-link">Spelen</a>
        <a href="/mastermind/compare" id="compare-link">Samenvatting</a>
        <a href="/mastermind/stats" id="stats-link">Stats</a>
        <a href="/mastermind/scoreboard" id="scoreboard-link">Scoreboard</a>
      </nav>
    </header>

    <div id="scoreboard-container">
        <!-- Monthly Scores Section -->
        <div class="monthly-scores" data-month-section>
            <h2 data-month></h2>
            <ol data-month-list class="score-list"></ol>
        </div>
        <div id="previous-month-winner" class="previous-month-winner">
            <h2 id="previous-month-winner-title"></h2>
            <p id="previous-month-winner-info"></p>
          </div>
          
        <!-- Most Months at the Top Section -->
        <div class="highest-scorers">
            <h2>Gewonnen Maanden:</h2>
            <ol id="highest-scorer-list" class="highest-score-list"></ol>
        </div>

        <!-- All-Time Highest Monthly Scores Section -->
        <div class="top-monthly-scores">
            <h2>Topscores:</h2>
            <ol id="top-monthly-scores-list" class="score-list"></ol>
        </div>
    </div>
    <script src="/js/scoreboard.js"></script>
</body>
</html>
