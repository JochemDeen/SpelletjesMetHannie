<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Pictionary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="stylesheet" href="/pictionary/css/pictionary.css">
</head>
<body>    
    <!-- Home Button -->
    <a href="/dashboard" class="home-button">
        <img src="/images/home.png" alt="Home" />
    </a>
      <!-- Title Area -->
  <h1 id="game-title">Pictionary!</h1>


    <!-- Navigation Links -->
    <div id="nav-links">
        <a href="/pictionary/scoreboard" id="scoreboard-link">Scoreboard</a>
    </div>

    <!-- Game State Container -->
    <div id="game-state-container">
        <!-- Scenario: Word Selection -->
        <div id="word-selection" class="hidden">
            <h3>Kies een moeilijkheidsgraad:</h3>
            <div id="difficulty-options">
                <!-- Buttons will be generated dynamically -->
            </div>
        </div>

        <!-- Scenario: Drawing Area -->
        <div id="drawing-container" class="hidden">
            <div id="draw-word-title"></div>

            <!-- Timer -->
            <div id="timer-bar"></div>
            <canvas id="drawing-canvas" width="800" height="400"></canvas>
            <div id="tools-container">
                <div id="color-picker">
                    <!-- Color buttons -->
                    <button class="color" data-color="rgb(0, 0, 0)" style="background-color: rgb(0, 0, 0);"></button>
                    <button class="color" data-color="rgb(255, 69, 58)" style="background-color: rgb(255, 69, 58);"></button>
                    <button class="color" data-color="rgb(0, 122, 255)" style="background-color: rgb(0, 122, 255);"></button>
                    <button class="color" data-color="rgb(52, 199, 89)" style="background-color: rgb(52, 199, 89);"></button>
                    <button class="color" data-color="rgb(90, 200, 250)" style="background-color: rgb(90, 200, 250);"></button>
                    <button class="color" data-color="rgb(255, 182, 193)" style="background-color: rgb(255, 182, 193);"></button>
                    <button class="color" data-color="rgb(255, 204, 0)" style="background-color: rgb(255, 204, 0);"></button>
                    <button class="color" data-color="rgb(255, 149, 0)" style="background-color: rgb(255, 149, 0);"></button>
                    <button class="color" data-color="rgb(162, 118, 83)" style="background-color: rgb(162, 118, 83);"></button>
                    <button class="color" data-color="rgb(142, 142, 147)" style="background-color: rgb(142, 142, 147);"></button>
                    <button class="eraser" data-tool="eraser" id="eraser-button">
                    <img src="/images/eraser-icon.png" alt="Eraser" />
                </button>
                <div id="thickness-controls">
                    <button id="thin-brush" class="thickness-btn" data-thickness="2">
                      <div class="thickness-dot thin"></div>
                    </button>
                    <button id="medium-brush" class="thickness-btn active" data-thickness="6">
                      <div class="thickness-dot medium"></div>
                    </button>
                    <button id="thick-brush" class="thickness-btn" data-thickness="12">
                      <div class="thickness-dot thick"></div>
                    </button>
                  </div>
                
                <button id="undo-button" class="drawing-control-btn">
                    <span>↩️ Ongedaan maken</span>
                  </button>
                  
            </div>

                <button id="finish-drawing">Klaar!</button>
            </div>
            
        </div>

        <!-- Scenario: Guess Submission -->
        <div id="guess-container" class="hidden">

            <div id="guessing" class="hidden">
                <div id="image-canvas"></div>
                <div id="guess-status">
                    <!-- Placeholder to show other users' statuses -->
                </div>
            </div>
        
            <!-- Scenario: Guess Submission Controls (Hidden by Default) -->
            <div id="guess-submission" class="hidden">
                <div id="guess-submission-controls">
                    <input type="text" id="guess-input" placeholder="Schrijf hier je keuze..." />
                    <button id="submit-guess">Plaats je keuze</button>
                </div>
            </div>
        </div>

        <!-- Guesses Table (Hidden by Default) -->
        <div id="guesses-table-container" class="hidden">
            <table>
              <thead>
                <tr>
                  <th title="Ronde">#</th>
                  <th>Speler</th>
                  <th>Tijd</th>
                  <th>Beurt</th>
                  <th>Cijfer</th>
                </tr>
              </thead>
              <tbody id="guessesTableBody">
                <!-- Rows will be dynamically added here -->
              </tbody>
            </table>
          </div>

        <!-- Scenario: Grading Guesses -->
        <div id="grading-guesses" class="hidden">
            <div id="grading-guesses-title"></div>
            <div id="image-canvas-guessing"></div>
            <div id="grading-scale-label">
                <span class="fout-label">Fout</span>
                <span class="goed-label">Goed</span>
            </div>
        
            <div id="guesses-list">
                <!-- Dynamically loaded guesses -->
            </div>
            <button id="submit-grades">Beoordelen</button>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/pictionary/js/pictionary.js"></script>
</body>
</html>
