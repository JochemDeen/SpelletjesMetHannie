<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Spel samenvatting</title>
  <link rel="stylesheet" href="/css/mastermind.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/compare.css">
</head>
<body>
    <header id="game-header">
      <a href="/dashboard" class="home-button">
        <img src="/images/home.png" alt="Home" />
      </a>
      <h1>Samenvatting</h1>
      <nav id="nav-links">
        <a href="/mastermind" id="play-link">Spelen</a>
        <a href="/mastermind/compare" id="compare-link">Samenvatting</a>
        <a href="/mastermind/stats" id="stats-link">Stats</a>
        <a href="/mastermind/scoreboard" id="scoreboard-link">Scoreboard</a>
      </nav>
    </header>


    <div class="date-navigation">
        <button id="prevDateButton" class="nav-arrow"><<</button>
        <span id="currentDate" class="results-date-header"></span>
        <button id="nextDateButton" class="nav-arrow">>></button>
    </div>
    
    
    <div id="captureSection">

    <div id="compare-container">
        <!-- User grids will be generated dynamically here -->
    </div>
    </div>
    <img id="shareButton" src="/images/share-ios.svg" alt="Share on WhatsApp" />

  <script src="/js/compare.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
</html>
<script>
  document.getElementById("shareButton").addEventListener("click", function() {
    html2canvas(document.getElementById("captureSection")).then(canvas => {
        canvas.toBlob(blob => {
            const file = new File([blob], "screenshot.png", { type: "image/png" });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({
                    files: [file],
                    text: "",
                }).then(() => {
                    console.log("Shared successfully");
                }).catch(error => {
                    console.error("Error sharing:", error);
                });
            } else {
                alert("Sharing not supported on this browser. Please use a compatible device.");
            }
        });
    });
});

</script>
