<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Instellingen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/settings.css">
  <script src="/js/settings.js" defer></script>
</head>
<body>
  <header>
    <h1>Instellingen</h1>
    <a href="/" class="home-button">
      <img src="/images/home.png" alt="Home" />
    </a>
  </header>
  <main>
    <section>
      <div class="toggle-container">
        <label class="switch">
          <input type="checkbox" id="pictionaryToggle">
          <span class="slider"></span>
        </label>
        <span class="toggle-label">Mee doen met Pictionary</span>
      </div>
      <div class="toggle-container">
        <label class="switch">
          <input type="checkbox" id="wieBenIkToggle">
          <span class="slider"></span>
        </label>
        <span class="toggle-label">Mee doen met Wie ben ik?</span>
      </div>
      <div id="message"></div>
    </section>
  </main>
</body>
</html>
